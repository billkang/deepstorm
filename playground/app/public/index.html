<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>任务管理系统 — 登录</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; background: #f5f7fa; color: #333; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
.card { background: #fff; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); padding: 32px; width: 380px; }
h1 { font-size: 20px; margin-bottom: 24px; text-align: center; color: #1a1a2e; }
.form-group { margin-bottom: 16px; }
label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 4px; color: #555; }
input { width: 100%; padding: 10px 12px; border: 1px solid #d0d5dd; border-radius: 6px; font-size: 15px; }
input:focus { outline: none; border-color: #4f6ef7; box-shadow: 0 0 0 2px rgba(79,110,247,0.15); }
.btn { width: 100%; padding: 10px; background: #4f6ef7; color: #fff; border: none; border-radius: 6px; font-size: 15px; cursor: pointer; font-weight: 500; }
.btn:hover { background: #3b5de7; }
.error { color: #e53e3e; font-size: 13px; margin-top: 8px; text-align: center; display: none; }
.links { text-align: center; margin-top: 16px; font-size: 14px; }
.links a { color: #4f6ef7; text-decoration: none; }
.links a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="card">
  <h1>📋 任务管理系统</h1>
  <form id="loginForm">
    <div class="form-group">
      <label for="username">用户名</label>
      <input type="text" id="username" name="username" required autocomplete="username" placeholder="输入用户名">
    </div>
    <div class="form-group">
      <label for="password">密码</label>
      <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="输入密码">
    </div>
    <div class="error" id="errorMsg"></div>
    <button type="submit" class="btn">登 录</button>
  </form>
  <div class="links">
    还没有账号？<a href="/register.html">注册</a>
  </div>
</div>
<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const errorEl = document.getElementById('errorMsg');
  const res = await fetch('/api/auth/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      username: document.getElementById('username').value,
      password: document.getElementById('password').value,
    }),
  });
  const data = await res.json();
  if (res.ok) {
    window.location.href = '/dashboard.html';
  } else {
    errorEl.textContent = data.error;
    errorEl.style.display = 'block';
  }
});
</script>
</body>
</html>
