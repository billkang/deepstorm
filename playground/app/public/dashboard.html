<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>任务管理系统 — 仪表盘</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; background: #f5f7fa; color: #333; }
/* ── Header ── */
.header { background: #1a1a2e; color: #fff; padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between; }
.header h1 { font-size: 18px; }
.header-right { display: flex; align-items: center; gap: 16px; font-size: 14px; }
.header-right .username { color: #a0aec0; }
.btn-logout { background: none; border: 1px solid #4a5568; color: #cbd5e0; padding: 4px 12px; border-radius: 4px; cursor: pointer; font-size: 13px; }
.btn-logout:hover { border-color: #e53e3e; color: #e53e3e; }
/* ── Container ── */
.container { max-width: 900px; margin: 0 auto; padding: 24px; }
/* ── Stats ── */
.stats { display: flex; gap: 16px; margin-bottom: 24px; }
.stat-card { flex: 1; background: #fff; border-radius: 8px; padding: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); text-align: center; }
.stat-card .num { font-size: 28px; font-weight: 700; color: #4f6ef7; }
.stat-card .label { font-size: 13px; color: #888; margin-top: 4px; }
/* ── Toolbar ── */
.toolbar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.toolbar input, .toolbar select { padding: 8px 12px; border: 1px solid #d0d5dd; border-radius: 6px; font-size: 14px; }
.toolbar input { flex: 1; min-width: 150px; }
.toolbar input:focus, .toolbar select:focus { outline: none; border-color: #4f6ef7; box-shadow: 0 0 0 2px rgba(79,110,247,0.15); }
.btn { padding: 8px 16px; background: #4f6ef7; color: #fff; border: none; border-radius: 6px; font-size: 14px; cursor: pointer; font-weight: 500; }
.btn:hover { background: #3b5de7; }
.btn-sm { padding: 4px 10px; font-size: 12px; }
.btn-success { background: #38a169; }
.btn-success:hover { background: #2f855a; }
.btn-danger { background: #e53e3e; }
.btn-danger:hover { background: #c53030; }
.btn-secondary { background: #718096; }
.btn-secondary:hover { background: #4a5568; }
/* ── Task List ── */
.task-list { background: #fff; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
.task-item { display: flex; align-items: center; padding: 12px 16px; border-bottom: 1px solid #f0f0f0; gap: 12px; }
.task-item:last-child { border-bottom: none; }
.task-check { width: 18px; height: 18px; cursor: pointer; }
.task-info { flex: 1; }
.task-title { font-size: 15px; font-weight: 500; }
.task-title.done { text-decoration: line-through; color: #a0aec0; }
.task-desc { font-size: 13px; color: #718096; margin-top: 2px; }
.task-actions { display: flex; gap: 4px; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 500; margin-left: 8px; }
.badge-todo { background: #edf2f7; color: #4a5568; }
.badge-done { background: #c6f6d5; color: #276749; }
.empty { text-align: center; padding: 40px; color: #a0aec0; font-size: 14px; }
/* ── Modal ── */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); justify-content: center; align-items: center; }
.modal-overlay.active { display: flex; }
.modal { background: #fff; border-radius: 8px; padding: 24px; width: 420px; max-width: 90vw; }
.modal h2 { font-size: 18px; margin-bottom: 16px; }
.modal .form-group { margin-bottom: 12px; }
.modal label { display: block; font-size: 13px; font-weight: 500; color: #555; margin-bottom: 3px; }
.modal input, .modal textarea, .modal select { width: 100%; padding: 8px 10px; border: 1px solid #d0d5dd; border-radius: 6px; font-size: 14px; }
.modal textarea { resize: vertical; min-height: 60px; }
.modal input:focus, .modal textarea:focus, .modal select:focus { outline: none; border-color: #4f6ef7; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
</style>
</head>
<body>
<div class="header">
  <h1>📋 任务管理系统</h1>
  <div class="header-right">
    <span class="username" id="usernameDisplay"></span>
    <button class="btn-logout" id="logoutBtn">退出登录</button>
  </div>
</div>

<div class="container">
  <div class="stats">
    <div class="stat-card"><div class="num" id="statTotal">0</div><div class="label">全部</div></div>
    <div class="stat-card"><div class="num" id="statTodo">0</div><div class="label">待办</div></div>
    <div class="stat-card"><div class="num" id="statDone">0</div><div class="label">已完成</div></div>
  </div>

  <div class="toolbar">
    <input type="text" id="searchInput" placeholder="搜索任务..." oninput="loadTasks()">
    <select id="statusFilter" onchange="loadTasks()">
      <option value="">全部状态</option>
      <option value="todo">待办</option>
      <option value="done">已完成</option>
    </select>
    <button class="btn" onclick="openCreateModal()">+ 新建任务</button>
  </div>

  <div class="task-list" id="taskList">
    <div class="empty">加载中...</div>
  </div>
</div>

<!-- 新建/编辑 Modal -->
<div class="modal-overlay" id="taskModal">
  <div class="modal">
    <h2 id="modalTitle">新建任务</h2>
    <div class="form-group">
      <label>标题</label>
      <input type="text" id="taskTitle" placeholder="任务标题">
    </div>
    <div class="form-group">
      <label>描述</label>
      <textarea id="taskDesc" placeholder="任务描述（可选）"></textarea>
    </div>
    <div class="form-group" id="statusGroup" style="display:none">
      <label>状态</label>
      <select id="taskStatus"><option value="todo">待办</option><option value="done">已完成</option></select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">取消</button>
      <button class="btn" id="saveBtn" onclick="saveTask()">保存</button>
    </div>
  </div>
</div>

<script src="/app.js"></script>
</body>
</html>
